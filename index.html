<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBru3 - Live Social Network</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        /* AUTH SCREEN */
        #auth-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            max-width: 400px;
            width: 100%;
        }

        .auth-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .auth-header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .auth-header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .auth-body {
            padding: 30px;
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 25px;
            border-bottom: 2px solid #e0e0e0;
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .auth-tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .auth-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        /* MAIN APP */
        #app-screen {
            display: none;
            height: 100vh;
        }

        .app-container {
            display: flex;
            height: 100%;
            background: white;
        }

        /* SIDEBAR */
        .sidebar {
            width: 280px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
        }

        .sidebar-header {
            padding: 25px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-header h2 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 15px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
            font-size: 15px;
        }

        .user-status {
            font-size: 12px;
            opacity: 0.8;
        }

        .search-bar {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .search-input {
            width: 100%;
            padding: 10px 15px;
            border: none;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 14px;
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .search-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.3);
        }

        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .user-item {
            padding: 12px 15px;
            margin-bottom: 5px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .user-item.active {
            background: rgba(255, 255, 255, 0.2);
        }

        .user-item-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #667eea;
            font-size: 16px;
        }

        .user-item-info {
            flex: 1;
        }

        .user-item-name {
            font-weight: 600;
            font-size: 14px;
        }

        .user-item-last-msg {
            font-size: 12px;
            opacity: 0.7;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .online-indicator {
            width: 10px;
            height: 10px;
            background: #4caf50;
            border-radius: 50%;
            border: 2px solid white;
        }

        .logout-btn {
            margin: 15px 20px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* CHAT AREA */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f5f5f5;
        }

        .chat-header {
            padding: 20px 25px;
            background: white;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .chat-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
        }

        .chat-user-info h3 {
            font-size: 18px;
            color: #333;
        }

        .chat-user-status {
            font-size: 13px;
            color: #4caf50;
            margin-top: 2px;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 70%;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .message.sent {
            align-self: flex-end;
        }

        .message.received {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
        }

        .message.sent .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received .message-bubble {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .message-time {
            font-size: 11px;
            color: #999;
            padding: 0 5px;
        }

        .message.sent .message-time {
            text-align: right;
        }

        .message-image {
            max-width: 100%;
            border-radius: 12px;
            margin-top: 5px;
            cursor: pointer;
        }

        .message-input-area {
            padding: 20px 25px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        .message-input-container {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .message-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 24px;
            resize: none;
            font-size: 14px;
            font-family: inherit;
            max-height: 100px;
        }

        .message-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .input-actions {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            background: #f0f0f0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            background: #e0e0e0;
            transform: scale(1.05);
        }

        .icon-btn.send {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .icon-btn.send:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .welcome-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #999;
            padding: 40px;
            text-align: center;
        }

        .welcome-screen h2 {
            font-size: 32px;
            margin-bottom: 15px;
            color: #667eea;
        }

        .welcome-screen p {
            font-size: 16px;
            line-height: 1.6;
        }

        /* LOADING */
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px 50px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            display: none;
            z-index: 1000;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .online-count {
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 13px;
            margin: 10px 20px;
            text-align: center;
        }

        input[type="file"] {
            display: none;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                position: absolute;
                height: 100%;
                z-index: 10;
                transform: translateX(-100%);
                transition: transform 0.3s;
            }

            .sidebar.show {
                transform: translateX(0);
            }

            .message {
                max-width: 85%;
            }
        }

        .typing-indicator {
            padding: 10px 15px;
            background: white;
            border-radius: 18px;
            display: inline-flex;
            gap: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <!-- LOADING INDICATOR -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div>Loading...</div>
    </div>

    <!-- AUTH SCREEN -->
    <div id="auth-screen">
        <div class="auth-container">
            <div class="auth-header">
                <h1>💬 ChatBru3</h1>
                <p>Connect with friends in real-time</p>
            </div>
            <div class="auth-body">
                <div class="auth-tabs">
                    <div class="auth-tab active" onclick="switchTab('login')">Login</div>
                    <div class="auth-tab" onclick="switchTab('signup')">Sign Up</div>
                </div>

                <div class="error-message" id="error-message"></div>

                <!-- LOGIN FORM -->
                <form class="auth-form active" id="login-form" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="login-email" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="login-password" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="auth-btn">Login</button>
                </form>

                <!-- SIGNUP FORM -->
                <form class="auth-form" id="signup-form" onsubmit="handleSignup(event)">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="signup-name" placeholder="Enter your full name" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="signup-email" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="signup-password" placeholder="Create a password" required minlength="6">
                    </div>
                    <button type="submit" class="auth-btn">Create Account</button>
                </form>
            </div>
        </div>
    </div>

    <!-- MAIN APP SCREEN -->
    <div id="app-screen">
        <div class="app-container">
            <!-- SIDEBAR -->
            <div class="sidebar">
                <div class="sidebar-header">
                    <h2>💬 ChatBru3</h2>
                    <div class="user-profile">
                        <div class="user-avatar" id="current-user-avatar"></div>
                        <div class="user-info">
                            <div class="user-name" id="current-user-name"></div>
                            <div class="user-status">Online</div>
                        </div>
                    </div>
                </div>

                <div class="search-bar">
                    <input type="text" class="search-input" id="search-users" placeholder="🔍 Search users..." oninput="searchUsers()">
                </div>

                <div class="online-count">
                    <span id="online-count">0</span> users online
                </div>

                <div class="users-list" id="users-list"></div>

                <button class="logout-btn" onclick="handleLogout()">Logout</button>
            </div>

            <!-- CHAT AREA -->
            <div class="chat-area">
                <div class="welcome-screen" id="welcome-screen">
                    <h2>Welcome to ChatBru3! 👋</h2>
                    <p>Select a user from the sidebar to start chatting.<br>All messages are live and saved in real-time!</p>
                </div>

                <div id="chat-screen" style="display: none; flex: 1; display: flex; flex-direction: column;">
                    <div class="chat-header">
                        <div class="chat-avatar" id="chat-avatar"></div>
                        <div class="chat-user-info">
                            <h3 id="chat-username"></h3>
                            <div class="chat-user-status" id="chat-user-status">Online</div>
                        </div>
                    </div>

                    <div class="messages-container" id="messages-container"></div>

                    <div class="message-input-area">
                        <div class="message-input-container">
                            <textarea class="message-input" id="message-input" placeholder="Type a message..." rows="1" onkeypress="handleKeyPress(event)"></textarea>
                            <div class="input-actions">
                                <label for="image-upload" class="icon-btn" title="Send image">
                                    📷
                                </label>
                                <input type="file" id="image-upload" accept="image/*" onchange="handleImageUpload(event)">
                                <button class="icon-btn send" onclick="sendMessage()" title="Send message">
                                    📤
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.ably.io/lib/ably.min-1.js"></script>
    <script>
        // ═══════════════════════════════════════════════════════════════
        //                      ABLY CONFIGURATION
        // ═══════════════════════════════════════════════════════════════
        const ABLY_API_KEY = 'rUFQfQ.MvOXIg:4xbqKq5SVTQx74J_dfxWCg4P5SptXZuzRw-3yWics6g';
        
        let ably;
        let usersChannel;
        let messagesChannel;
        let presenceChannel;
        let currentUser = null;
        let selectedUser = null;
        let allUsers = {};
        let onlineUsers = new Set();
        let userMessages = {};

        // ═══════════════════════════════════════════════════════════════
        //                      INITIALIZATION
        // ═══════════════════════════════════════════════════════════════
        window.addEventListener('load', () => {
            const savedUser = localStorage.getItem('chatbru3_user');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                initializeApp();
            }
        });

        function initializeApp() {
            showLoading(true);
            
            ably = new Ably.Realtime({
                key: ABLY_API_KEY,
                clientId: currentUser.id
            });

            ably.connection.on('connected', () => {
                console.log('✅ Connected to Ably');
                initializeChannels();
            });

            ably.connection.on('failed', () => {
                showError('Connection failed. Please refresh the page.');
                showLoading(false);
            });
        }

        function initializeChannels() {
            usersChannel = ably.channels.get('bruchannel-users');
            messagesChannel = ably.channels.get('bruchannel-messages');
            presenceChannel = ably.channels.get('bruchannel-presence');

            // Subscribe to user events
            usersChannel.subscribe('user-registered', handleUserRegistered);
            usersChannel.subscribe('user-data', handleUserData);

            // Subscribe to messages
            messagesChannel.subscribe('new-message', handleNewMessage);

            // Subscribe to presence
            presenceChannel.presence.subscribe('enter', handleUserOnline);
            presenceChannel.presence.subscribe('leave', handleUserOffline);
            presenceChannel.presence.enter({
                name: currentUser.name,
                email: currentUser.email
            });

            // Load all users
            loadUsers();

            // Get presence members
            presenceChannel.presence.get((err, members) => {
                if (!err) {
                    members.forEach(member => {
                        onlineUsers.add(member.clientId);
                    });
                    updateOnlineCount();
                }
            });

            showAppScreen();
            showLoading(false);
        }

        // ═══════════════════════════════════════════════════════════════
        //                      AUTH FUNCTIONS
        // ═══════════════════════════════════════════════════════════════
        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelectorAll('.auth-tab')[0].classList.add('active');
                document.getElementById('login-form').classList.add('active');
            } else {
                document.querySelectorAll('.auth-tab')[1].classList.add('active');
                document.getElementById('signup-form').classList.add('active');
            }
            hideError();
        }

        function handleSignup(e) {
            e.preventDefault();
            showLoading(true);
            hideError();

            const name = document.getElementById('signup-name').value.trim();
            const email = document.getElementById('signup-email').value.trim().toLowerCase();
            const password = document.getElementById('signup-password').value;

            const userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            
            const newUser = {
                id: userId,
                name: name,
                email: email,
                password: btoa(password), // Simple encoding (not secure for production)
                createdAt: Date.now()
            };

            // Broadcast new user
            usersChannel.publish('user-registered', newUser);
            
            // Save locally
            currentUser = newUser;
            localStorage.setItem('chatbru3_user', JSON.stringify(newUser));
            
            setTimeout(() => {
                initializeApp();
            }, 500);
        }

        function handleLogin(e) {
            e.preventDefault();
            showLoading(true);
            hideError();

            const email = document.getElementById('login-email').value.trim().toLowerCase();
            const password = document.getElementById('login-password').value;

            // Request user data
            usersChannel.publish('request-user', { email: email });

            // Wait for response
            const timeout = setTimeout(() => {
                showLoading(false);
                showError('User not found. Please sign up first.');
            }, 3000);

            const loginSubscription = usersChannel.subscribe('user-data', (message) => {
                const userData = message.data;
                if (userData.email === email) {
                    clearTimeout(timeout);
                    usersChannel.unsubscribe(loginSubscription);

                    if (atob(userData.password) === password) {
                        currentUser = userData;
                        localStorage.setItem('chatbru3_user', JSON.stringify(userData));
                        initializeApp();
                    } else {
                        showLoading(false);
                        showError('Incorrect password.');
                    }
                }
            });
        }

        function handleLogout() {
            if (presenceChannel) {
                presenceChannel.presence.leave();
            }
            localStorage.removeItem('chatbru3_user');
            location.reload();
        }

        // ═══════════════════════════════════════════════════════════════
        //                      USER MANAGEMENT
        // ═══════════════════════════════════════════════════════════════
        function handleUserRegistered(message) {
            const user = message.data;
            allUsers[user.id] = user;
            renderUsersList();
        }

        function handleUserData(message) {
            const user = message.data;
            allUsers[user.id] = user;
        }

        function loadUsers() {
            // Request all users to broadcast their data
            usersChannel.publish('request-all-users', {});
            
            // Broadcast current user
            setTimeout(() => {
                usersChannel.publish('user-data', currentUser);
            }, 500);

            // Subscribe to user requests
            usersChannel.subscribe('request-user', (message) => {
                if (currentUser.email === message.data.email) {
                    usersChannel.publish('user-data', currentUser);
                }
            });

            usersChannel.subscribe('request-all-users', () => {
                usersChannel.publish('user-data', currentUser);
            });
        }

        function renderUsersList() {
            const usersList = document.getElementById('users-list');
            usersList.innerHTML = '';

            Object.values(allUsers).forEach(user => {
                if (user.id !== currentUser.id) {
                    const userItem = document.createElement('div');
                    userItem.className = 'user-item';
                    if (selectedUser && selectedUser.id === user.id) {
                        userItem.classList.add('active');
                    }
                    userItem.onclick = () => selectUser(user);

                    const initials = user.name.split(' ').map(n => n[0]).join('').toUpperCase();
                    const isOnline = onlineUsers.has(user.id);
                    const lastMsg = getLastMessage(user.id);

                    userItem.innerHTML = `
                        <div class="user-item-avatar">${initials}</div>
                        <div class="user-item-info">
                            <div class="user-item-name">${user.name}</div>
                            <div class="user-item-last-msg">${lastMsg || 'No messages yet'}</div>
                        </div>
                        ${isOnline ? '<div class="online-indicator"></div>' : ''}
                    `;

                    usersList.appendChild(userItem);
                }
            });
        }

        function searchUsers() {
            const query = document.getElementById('search-users').value.toLowerCase();
            const userItems = document.querySelectorAll('.user-item');
            
            userItems.forEach(item => {
                const name = item.querySelector('.user-item-name').textContent.toLowerCase();
                if (name.includes(query)) {
                    item.style.display = 'flex';
                } else {
                    item.style.display = 'none';
                }
            });
        }

        function handleUserOnline(member) {
            onlineUsers.add(member.clientId);
            updateOnlineCount();
            renderUsersList();
        }

        function handleUserOffline(member) {
            onlineUsers.delete(member.clientId);
            updateOnlineCount();
            renderUsersList();
        }

        function updateOnlineCount() {
            document.getElementById('online-count').textContent = onlineUsers.size;
        }

        // ═══════════════════════════════════════════════════════════════
        //                      MESSAGING
        // ═══════════════════════════════════════════════════════════════
        function selectUser(user) {
            selectedUser = user;
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';

            const initials = user.name.split(' ').map(n => n[0]).join('').toUpperCase();
            document.getElementById('chat-avatar').textContent = initials;
            document.getElementById('chat-username').textContent = user.name;
            
            const isOnline = onlineUsers.has(user.id);
            document.getElementById('chat-user-status').textContent = isOnline ? 'Online' : 'Offline';
            document.getElementById('chat-user-status').style.color = isOnline ? '#4caf50' : '#999';

            renderUsersList();
            loadMessages(user.id);
        }

        function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            
            if (!text || !selectedUser) return;

            const message = {
                id: 'msg_' + Date.now(),
                from: currentUser.id,
                to: selectedUser.id,
                text: text,
                timestamp: Date.now(),
                type: 'text'
            };

            messagesChannel.publish('new-message', message);
            
            input.value = '';
            input.style.height = 'auto';
            
            // Store locally
            storeMessage(message);
            renderMessage(message);
        }

        function handleImageUpload(e) {
            const file = e.target.files[0];
            if (!file || !selectedUser) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const message = {
                    id: 'msg_' + Date.now(),
                    from: currentUser.id,
                    to: selectedUser.id,
                    image: event.target.result,
                    timestamp: Date.now(),
                    type: 'image'
                };

                messagesChannel.publish('new-message', message);
                storeMessage(message);
                renderMessage(message);
            };
            reader.readAsDataURL(file);
            
            e.target.value = '';
        }

        function handleNewMessage(message) {
            const msgData = message.data;
            
            // Check if message is for current user
            if (msgData.to === currentUser.id || msgData.from === currentUser.id) {
                storeMessage(msgData);
                
                // If chat is open with sender, show message
                if (selectedUser && (msgData.from === selectedUser.id || msgData.to === selectedUser.id)) {
                    renderMessage(msgData);
                }
                
                renderUsersList();
            }
        }

        function storeMessage(message) {
            const otherUserId = message.from === currentUser.id ? message.to : message.from;
            
            if (!userMessages[otherUserId]) {
                userMessages[otherUserId] = [];
            }
            
            // Check if message already exists
            const exists = userMessages[otherUserId].some(m => m.id === message.id);
            if (!exists) {
                userMessages[otherUserId].push(message);
                userMessages[otherUserId].sort((a, b) => a.timestamp - b.timestamp);
            }
        }

        function loadMessages(userId) {
            const container = document.getElementById('messages-container');
            container.innerHTML = '';

            const messages = userMessages[userId] || [];
            messages.forEach(msg => renderMessage(msg));
            
            scrollToBottom();
        }

        function renderMessage(message) {
            const container = document.getElementById('messages-container');
            const isSent = message.from === currentUser.id;
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isSent ? 'sent' : 'received'}`;
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            
            if (message.type === 'image') {
                const img = document.createElement('img');
                img.src = message.image;
                img.className = 'message-image';
                img.onclick = () => window.open(message.image, '_blank');
                bubble.appendChild(img);
            } else {
                bubble.textContent = message.text;
            }
            
            const time = document.createElement('div');
            time.className = 'message-time';
            time.textContent = new Date(message.timestamp).toLocaleTimeString([], { 
                hour: '2-digit', 
                minute: '2-digit' 
            });
            
            messageDiv.appendChild(bubble);
            messageDiv.appendChild(time);
            container.appendChild(messageDiv);
            
            scrollToBottom();
        }

        function getLastMessage(userId) {
            const messages = userMessages[userId];
            if (!messages || messages.length === 0) return null;
            
            const lastMsg = messages[messages.length - 1];
            if (lastMsg.type === 'image') return '📷 Photo';
            return lastMsg.text.substring(0, 30) + (lastMsg.text.length > 30 ? '...' : '');
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function scrollToBottom() {
            const container = document.getElementById('messages-container');
            container.scrollTop = container.scrollHeight;
        }

        // ═══════════════════════════════════════════════════════════════
        //                      UI HELPERS
        // ═══════════════════════════════════════════════════════════════
        function showAppScreen() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'block';
            
            const initials = currentUser.name.split(' ').map(n => n[0]).join('').toUpperCase();
            document.getElementById('current-user-avatar').textContent = initials;
            document.getElementById('current-user-name').textContent = currentUser.name;
        }

        function showLoading(show) {
            document.getElementById('loading').classList.toggle('show', show);
        }

        function showError(message) {
            const errorEl = document.getElementById('error-message');
            errorEl.textContent = message;
            errorEl.classList.add('show');
        }

        function hideError() {
            document.getElementById('error-message').classList.remove('show');
        }

        // Auto-resize textarea
        document.addEventListener('DOMContentLoaded', () => {
            const textarea = document.getElementById('message-input');
            if (textarea) {
                textarea.addEventListener('input', function() {
                    this.style.height = 'auto';
                    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
                });
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BruLive Link Sharing & Chat</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f4f4f4; color: #333; }
        h1 { text-align: center; color: #007bff; }
        #linkForm { margin-bottom: 20px; text-align: center; }
        input[type="url"], input[type="text"] { padding: 10px; width: 300px; margin: 5px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
        #linkList { list-style: none; padding: 0; max-width: 600px; margin: 0 auto; }
        #linkList li { background: white; margin: 10px 0; padding: 10px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; align-items: center; }
        #linkList li img { width: 50px; height: 50px; border-radius: 50%; margin-right: 10px; object-fit: cover; }
        #linkList li a { color: #007bff; text-decoration: none; }
        #viewer { display: none; width: 100%; height: 80vh; border: 2px solid #ccc; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin: 20px auto; max-width: 800px; }
        #chatSection { max-width: 600px; margin: 20px auto; background: white; padding: 15px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #chatLog { height: 200px; overflow-y: scroll; border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; background: #fafafa; }
        #chatInput { width: calc(100% - 80px); padding: 10px; }
        #sendChat { width: 70px; }
        footer { text-align: center; margin-top: 20px; font-size: 12px; color: #888; }
        .animate-new { animation: fadeIn 1s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
</head>
<body>
    <h1>BruLive: Share Links & Group Chat</h1>
    
    <div id="linkForm">
        <input type="url" id="linkInput" placeholder="Enter your website link" required>
        <input type="url" id="thumbnailInput" placeholder="Enter thumbnail URL (profile pic)" required>
        <button onclick="submitLink()">Add Link</button>
    </div>
    
    <ul id="linkList"></ul>
    
    <iframe id="viewer" sandbox="allow-scripts allow-same-origin"></iframe>
    
    <div id="chatSection">
        <h2>Group Chat</h2>
        <div id="chatLog"></div>
        <input type="text" id="chatInput" placeholder="Type your message...">
        <button id="sendChat" onclick="sendChat()">Send</button>
    </div>
    
    <footer>
        Special thanks to INEZA AIME BRUNO and @Nocopyright Allowed and @all rights Reserved @2026
    </footer>

    <script>
        const ably = new Ably.Realtime('y9xXqg.2tUnig:I55mAICO-q_qpR1KKt97PLYJinu_GSA8tuU760URSbM');
        const channel = ably.channels.get('brulive');
        
        // Subscribe for live updates
        channel.subscribe('new_link', (msg) => {
            addLinkToList(msg.data.link, msg.data.thumbnail);
        });
        
        channel.subscribe('chat_message', (msg) => {
            const chatLog = document.getElementById('chatLog');
            const p = document.createElement('p');
            p.innerHTML = `<strong>Anonymous:</strong> ${msg.data.text}`;
            p.classList.add('animate-new');
            chatLog.appendChild(p);
            chatLog.scrollTop = chatLog.scrollHeight;
        });
        
        // Load history on connect
        channel.history({ limit: 100 }, (err, resultPage) => {
            if (err) return console.error(err);
            const messages = resultPage.items.reverse();
            messages.forEach((msg) => {
                if (msg.name === 'new_link') {
                    addLinkToList(msg.data.link, msg.data.thumbnail);
                } else if (msg.name === 'chat_message') {
                    const chatLog = document.getElementById('chatLog');
                    const p = document.createElement('p');
                    p.innerHTML = `<strong>Anonymous:</strong> ${msg.data.text}`;
                    chatLog.appendChild(p);
                }
            });
            document.getElementById('chatLog').scrollTop = document.getElementById('chatLog').scrollHeight;
        });
        
        function addLinkToList(link, thumbnail) {
            const list = document.getElementById('linkList');
            const li = document.createElement('li');
            li.classList.add('animate-new');
            li.innerHTML = `<img src="${thumbnail}" alt="Thumbnail"><a href="#" onclick="openInIframe('${link}')">${link}</a>`;
            list.appendChild(li);
        }
        
        function submitLink() {
            const link = document.getElementById('linkInput').value;
            const thumbnail = document.getElementById('thumbnailInput').value;
            if (link && thumbnail) {
                channel.publish('new_link', { link, thumbnail });
                document.getElementById('linkInput').value = '';
                document.getElementById('thumbnailInput').value = '';
            }
        }
        
        function sendChat() {
            const text = document.getElementById('chatInput').value;
            if (text) {
                channel.publish('chat_message', { text });
                document.getElementById('chatInput').value = '';
            }
        }
        
        function openInIframe(url) {
            const viewer = document.getElementById('viewer');
            viewer.src = url;
            viewer.style.display = 'block';
        }
    </script>
</body>
</html>
